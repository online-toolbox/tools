<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Pro - Image to Text</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }
.container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    h1 {
      font-size: 2rem; margin-bottom: 8px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
.subtitle { color: #94a3b8; margin-bottom: 30px; }

.tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid #334155;
    }
.tab {
      background: none;
      border: none;
      color: #94a3b8;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 1rem;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
.tab.active {
      color: #38bdf8;
      border-bottom-color: #38bdf8;
    }
.tab-content { display: none; }
.tab-content.active { display: block; }

.upload-area {
      background: #1e293b; border: 2px dashed #334155; border-radius: 12px;
      padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
.upload-area:hover,.upload-area.dragover { border-color: #38bdf8; background: #1e293b80; }
    input[type="file"] { display: none; }

.url-input-group {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px;
      display: flex; gap: 10px;
    }
.url-input-group input {
      flex: 1; background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      padding: 12px 16px; border-radius: 8px; font-size: 1rem;
    }
.url-input-group input:focus { outline: none; border-color: #38bdf8; }

.btn {
      background: #0ea5e9; color: #0f172a; border: none; padding: 12px 24px;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem;
      white-space: nowrap;
    }
.btn:hover { background: #38bdf8; }
.btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

.controls { margin: 20px 0; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }

.lang-select-wrapper {
      position: relative;
      min-width: 280px;
    }
.lang-select-wrapper input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 1rem;
    }
.lang-select-wrapper input:focus { outline: none; border-color: #38bdf8; }
.lang-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
.lang-dropdown.show { display: block; }
.lang-option {
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
.lang-option:hover { background: #334155; }
.lang-option.selected { background: #0ea5e9; color: #0f172a; }

.checkbox { display: flex; align-items: center; gap: 8px; }
.checkbox input { width: 18px; height: 18px; }

.preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
.preview-box { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; }
.preview-box h4 { margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem; }
.preview-box img,.preview-box canvas { max-width: 100%; border-radius: 4px; }

.progress { background: #1e293b; border-radius: 8px; padding: 20px; margin: 20px 0; display: none; }
.progress-bar { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
.progress-fill { background: linear-gradient(90deg, #38bdf8, #818cf8); height: 100%; width: 0%; transition: width 0.3s; }

.result { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; margin: 20px 0; display: none; }
    textarea {
      width: 100%; min-height: 200px; background: #0f172a; border: 1px solid #334155;
      color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.95rem; resize: vertical;
    }
.back { color: #38bdf8; text-decoration: none; display: inline-block; margin-bottom: 20px; }

.log {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 15px 0;
      font-family: monospace;
      font-size: 0.85rem;
      color: #94a3b8;
      display: none;
      max-height: 120px;
      overflow-y: auto;
    }
.log-line { padding: 2px 0; }
.log-line.success { color: #22c55e; }
.log-line.warn { color: #fbbf24; }
.log-line.error { color: #f87171; }

.error {
      background: #1e293b;
      border: 1px solid #dc2626;
      color: #fecaca;
      padding: 16px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
      line-height: 1.5;
    }
.error strong { color: #fca5a5; }
.error.fix { margin-top: 10px; color: #e2e8f0; }
.error.fix span { color: #38bdf8; font-weight: 600; }

.url-hint {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 10px;
      padding-left: 4px;
    }

.toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      border: 1px solid #38bdf8;
      color: #e2e8f0;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
    }
.toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
.toast svg {
      width: 18px;
      height: 18px;
      stroke: #22c55e;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to ToolNest</a>
    <h1>OCR Pro</h1>
    <p class="subtitle">Extract text from images in 100+ languages</p>

    <div class="tabs">
      <button class="tab active" data-tab="upload">Upload File</button>
      <button class="tab" data-tab="url">From URL</button>
    </div>

    <div class="tab-content active" id="upload-tab">
      <div class="upload-area" id="uploadArea">
        <p style="font-size: 1.1rem; margin-bottom: 10px;">Drop image here or click to upload</p>
        <p style="color: #64748b; font-size: 0.9rem;">PNG, JPG, WEBP. Max 10MB</p>
        <input type="file" id="fileInput" accept="image/*">
      </div>
    </div>

    <div class="tab-content" id="url-tab">
      <div class="url-input-group">
        <input type="url" id="urlInput" placeholder="https://example.com/image.jpg">
        <button class="btn" id="loadUrlBtn">Load Image</button>
      </div>
      <p class="url-hint">We’ll try loading directly first. If the site blocks it, we’ll use a secure proxy automatically.</p>
      <div class="log" id="urlLog"></div>
      <div class="error" id="urlError"></div>
    </div>

    <div class="controls">
      <label>Language:</label>
      <div class="lang-select-wrapper">
        <input type="text" id="langSearch" placeholder="Search language..." value="English">
        <div class="lang-dropdown" id="langDropdown"></div>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="preprocess" checked>
        <label for="preprocess">Enhance image</label>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="upscale" checked>
        <label for="upscale">2x Upscale</label>
      </div>

      <button class="btn" id="extractBtn" disabled>Extract Text</button>
    </div>

    <div class="preview-grid" id="previewGrid" style="display:none;">
      <div class="preview-box">
        <h4>Original</h4>
        <div id="originalPreview"></div>
      </div>
      <div class="preview-box">
        <h4>Processed</h4>
        <canvas id="processedCanvas"></canvas>
      </div>
    </div>

    <div class="progress" id="progress">
      <div id="progressText">Starting OCR...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="result" id="result">
      <h3 style="margin-bottom: 15px;">Extracted Text:</h3>
      <textarea id="outputText" readonly></textarea>
      <button class="btn" onclick="copyText()">Copy Text</button>
      <button class="btn" onclick="downloadText()">Download.txt</button>
    </div>
  </div>

  <script>
    let selectedImageBlob = null;
    let processedImageBlob = null;
    let currentLang = 'eng';

    const LANGUAGES = [
      { code: 'afr', name: 'Afrikaans' },
      { code: 'amh', name: 'Amharic' },
      { code: 'ara', name: 'Arabic' },
      { code: 'asm', name: 'Assamese' },
      { code: 'aze', name: 'Azerbaijani' },
      { code: 'aze_cyrl', name: 'Azerbaijani Cyrillic' },
      { code: 'bel', name: 'Belarusian' },
      { code: 'ben', name: 'Bengali' },
      { code: 'bod', name: 'Tibetan' },
      { code: 'bos', name: 'Bosnian' },
      { code: 'bul', name: 'Bulgarian' },
      { code: 'cat', name: 'Catalan' },
      { code: 'ceb', name: 'Cebuano' },
      { code: 'ces', name: 'Czech' },
      { code: 'chi_sim', name: 'Chinese Simplified' },
      { code: 'chi_tra', name: 'Chinese Traditional' },
      { code: 'chr', name: 'Cherokee' },
      { code: 'cym', name: 'Welsh' },
      { code: 'dan', name: 'Danish' },
      { code: 'deu', name: 'German' },
      { code: 'dzo', name: 'Dzongkha' },
      { code: 'ell', name: 'Greek' },
      { code: 'eng', name: 'English' },
      { code: 'enm', name: 'Middle English' },
      { code: 'epo', name: 'Esperanto' },
      { code: 'est', name: 'Estonian' },
      { code: 'eus', name: 'Basque' },
      { code: 'fas', name: 'Persian' },
      { code: 'fin', name: 'Finnish' },
      { code: 'fra', name: 'French' },
      { code: 'frk', name: 'Frankish' },
      { code: 'frm', name: 'Middle French' },
      { code: 'gle', name: 'Irish' },
      { code: 'glg', name: 'Galician' },
      { code: 'grc', name: 'Ancient Greek' },
      { code: 'guj', name: 'Gujarati' },
      { code: 'hat', name: 'Haitian Creole' },
      { code: 'heb', name: 'Hebrew' },
      { code: 'hin', name: 'Hindi' },
      { code: 'hrv', name: 'Croatian' },
      { code: 'hun', name: 'Hungarian' },
      { code: 'iku', name: 'Inuktitut' },
      { code: 'ind', name: 'Indonesian' },
      { code: 'isl', name: 'Icelandic' },
      { code: 'ita', name: 'Italian' },
      { code: 'ita_old', name: 'Old Italian' },
      { code: 'jav', name: 'Javanese' },
      { code: 'jpn', name: 'Japanese' },
      { code: 'kan', name: 'Kannada' },
      { code: 'kat', name: 'Georgian' },
      { code: 'kat_old', name: 'Old Georgian' },
      { code: 'kaz', name: 'Kazakh' },
      { code: 'khm', name: 'Khmer' },
      { code: 'kir', name: 'Kyrgyz' },
      { code: 'kor', name: 'Korean' },
      { code: 'kur', name: 'Kurdish' },
      { code: 'lao', name: 'Lao' },
      { code: 'lat', name: 'Latin' },
      { code: 'lav', name: 'Latvian' },
      { code: 'lit', name: 'Lithuanian' },
      { code: 'mal', name: 'Malayalam' },
      { code: 'mar', name: 'Marathi' },
      { code: 'mkd', name: 'Macedonian' },
      { code: 'mlt', name: 'Maltese' },
      { code: 'mon', name: 'Mongolian' },
      { code: 'mri', name: 'Maori' },
      { code: 'msa', name: 'Malay' },
      { code: 'mya', name: 'Burmese' },
      { code: 'nep', name: 'Nepali' },
      { code: 'nld', name: 'Dutch' },
      { code: 'nor', name: 'Norwegian' },
      { code: 'ori', name: 'Oriya' },
      { code: 'pan', name: 'Punjabi' },
      { code: 'pol', name: 'Polish' },
      { code: 'por', name: 'Portuguese' },
      { code: 'pus', name: 'Pashto' },
      { code: 'ron', name: 'Romanian' },
      { code: 'rus', name: 'Russian' },
      { code: 'san', name: 'Sanskrit' },
      { code: 'sin', name: 'Sinhala' },
      { code: 'slk', name: 'Slovak' },
      { code: 'slv', name: 'Slovenian' },
      { code: 'spa', name: 'Spanish' },
      { code: 'spa_old', name: 'Old Spanish' },
      { code: 'sqi', name: 'Albanian' },
      { code: 'srp', name: 'Serbian' },
      { code: 'srp_latn', name: 'Serbian Latin' },
      { code: 'swa', name: 'Swahili' },
      { code: 'swe', name: 'Swedish' },
      { code: 'syr', name: 'Syriac' },
      { code: 'tam', name: 'Tamil' },
      { code: 'tel', name: 'Telugu' },
      { code: 'tgk', name: 'Tajik' },
      { code: 'tgl', name: 'Tagalog' },
      { code: 'tha', name: 'Thai' },
      { code: 'tir', name: 'Tigrinya' },
      { code: 'tur', name: 'Turkish' },
      { code: 'uig', name: 'Uyghur' },
      { code: 'ukr', name: 'Ukrainian' },
      { code: 'urd', name: 'Urdu' },
      { code: 'uzb', name: 'Uzbek' },
      { code: 'uzb_cyrl', name: 'Uzbek Cyrillic' },
      { code: 'vie', name: 'Vietnamese' },
      { code: 'yid', name: 'Yiddish' },
      { code: 'eng+tel', name: 'English + Telugu' },
      { code: 'eng+hin', name: 'English + Hindi' },
      { code: 'eng+tam', name: 'English + Tamil' },
      { code: 'eng+kan', name: 'English + Kannada' },
      { code: 'eng+tel+hin', name: 'English + Telugu + Hindi' },
    ];

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
        resetState();
      };
    });

    // Language search dropdown
    const langSearch = document.getElementById('langSearch');
    const langDropdown = document.getElementById('langDropdown');

    function renderLangOptions(filter = '') {
      langDropdown.innerHTML = '';
      const filtered = LANGUAGES.filter(l =>
        l.name.toLowerCase().includes(filter.toLowerCase()) ||
        l.code.toLowerCase().includes(filter.toLowerCase())
      );
      filtered.forEach(lang => {
        const div = document.createElement('div');
        div.className = 'lang-option';
        if (lang.code === currentLang) div.classList.add('selected');
        div.textContent = lang.name;
        div.onclick = () => {
          currentLang = lang.code;
          langSearch.value = lang.name;
          langDropdown.classList.remove('show');
        };
        langDropdown.appendChild(div);
      });
    }

    langSearch.onfocus = () => {
      renderLangOptions(langSearch.value);
      langDropdown.classList.add('show');
    };

    langSearch.oninput = () => {
      renderLangOptions(langSearch.value);
      langDropdown.classList.add('show');
    };

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.lang-select-wrapper')) {
        langDropdown.classList.remove('show');
      }
    });

    function resetState() {
      selectedImageBlob = null;
      processedImageBlob = null;
      document.getElementById('extractBtn').disabled = true;
      document.getElementById('previewGrid').style.display = 'none';
      document.getElementById('result').style.display = 'none';
      document.getElementById('urlError').style.display = 'none';
      document.getElementById('urlLog').style.display = 'none';
      document.getElementById('urlLog').innerHTML = '';
    }

    function addLog(msg, type = '') {
      const log = document.getElementById('urlLog');
      log.style.display = 'block';
      const line = document.createElement('div');
      line.className = 'log-line ' + type;
      line.textContent = '> ' + msg;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    // File upload
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    uploadArea.onclick = () => fileInput.click();
    uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); };
    uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
    uploadArea.ondrop = (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => { if (e.target.files.length) handleFile(e.target.files[0]); };

    function handleFile(file) {
      if (!file.type.startsWith('image/')) return showToast('Please upload an image');
      if (file.size > 10 * 1024 * 1024) return showToast('Max 10MB');
      selectedImageBlob = file;
      processImage(URL.createObjectURL(file));
    }

    // URL input with transparent proxy fallback + logging
    document.getElementById('loadUrlBtn').onclick = async () => {
      const url = document.getElementById('urlInput').value.trim();
      const errorDiv = document.getElementById('urlError');
      const logDiv = document.getElementById('urlLog');
      errorDiv.style.display = 'none';
      logDiv.innerHTML = '';
      logDiv.style.display = 'block';

      if (!url) return showUrlError('Please enter an image URL');

      document.getElementById('loadUrlBtn').disabled = true;
      document.getElementById('loadUrlBtn').textContent = 'Loading...';

      try {
        addLog('Trying direct fetch...');
        let response;
        try {
          response = await fetch(url, { mode: 'cors' });
          if (!response.ok) throw new Error('HTTP ' + response.status);
          addLog('Direct fetch successful', 'success');
        } catch (directErr) {
          addLog('Direct fetch blocked by CORS', 'warn');
          addLog('Switching to secure proxy...');
          const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
          response = await fetch(proxyUrl);
          if (!response.ok) throw new Error('Proxy fetch failed');
          addLog('Proxy fetch successful', 'success');
        }

        const blob = await response.blob();
        if (!blob.type.startsWith('image/')) throw new Error('URL is not an image');

        selectedImageBlob = blob;
        addLog('Image loaded. Ready for OCR.', 'success');
        processImage(URL.createObjectURL(blob));
      } catch (err) {
        addLog('All methods failed', 'error');
        showUrlError(`
          <strong>Couldn’t load image from this URL.</strong><br>
          The website blocks all external access for security.
          <div class="fix">
            <span>Quick fix:</span> Right-click the image → "Save image as..." → Switch to <span>"Upload File"</span> tab and upload it.
          </div>
        `);
      } finally {
        document.getElementById('loadUrlBtn').disabled = false;
        document.getElementById('loadUrlBtn').textContent = 'Load Image';
      }
    };

    function showUrlError(html) {
      const errorDiv = document.getElementById('urlError');
      errorDiv.innerHTML = html;
      errorDiv.style.display = 'block';
    }

    // Image processing
    async function processImage(src) {
      document.getElementById('originalPreview').innerHTML = `<img src="${src}">`;
      document.getElementById('previewGrid').style.display = 'grid';
      document.getElementById('extractBtn').disabled = false;
      document.getElementById('result').style.display = 'none';
      await preprocessImage(src);
    }

    async function preprocessImage(dataUrl) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const canvas = document.getElementById('processedCanvas');
        const ctx = canvas.getContext('2d');
        let scale = document.getElementById('upscale').checked? 2 : 1;
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        if (document.getElementById('preprocess').checked) {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            const contrast = 1.5;
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            const newVal = factor * (avg - 128) + 128;
            data[i] = data[i + 1] = data[i + 2] = newVal;
          }
          ctx.putImageData(imageData, 0, 0);
        }
        canvas.toBlob(blob => { processedImageBlob = blob; });
      };
      img.src = dataUrl;
    }

    // OCR
    document.getElementById('extractBtn').onclick = async () => {
      if (!processedImageBlob) return;
      document.getElementById('extractBtn').disabled = true;
      document.getElementById('progress').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      try {
        const { data: { text } } = await Tesseract.recognize(
          processedImageBlob,
          currentLang,
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                const pct = Math.round(m.progress * 100);
                document.getElementById('progressText').textContent = `Recognizing: ${pct}%`;
                document.getElementById('progressFill').style.width = pct + '%';
              } else {
                document.getElementById('progressText').textContent = m.status;
              }
            },
            tessedit_pageseg_mode: Tesseract.PSM.AUTO,
            tessedit_ocr_engine_mode: Tesseract.OEM.LSTM_ONLY,
            preserve_interword_spaces: '1',
          }
        );
        document.getElementById('outputText').value = text.trim();
        document.getElementById('progress').style.display = 'none';
        document.getElementById('result').style.display = 'block';
      } catch (err) {
        showToast('OCR failed: ' + err.message);
        document.getElementById('progress').style.display = 'none';
      }
      document.getElementById('extractBtn').disabled = false;
    };

    document.getElementById('preprocess').onchange = document.getElementById('upscale').onchange = () => {
      if (selectedImageBlob) processImage(URL.createObjectURL(selectedImageBlob));
    };

    function copyText() {
      const text = document.getElementById('outputText');
      text.select();
      text.setSelectionRange(0, 99999);

      navigator.clipboard.writeText(text.value).then(() => {
        showToast('Copied to clipboard');
      }).catch(() => {
        document.execCommand('copy');
        showToast('Copied to clipboard');
      });
    }

    function downloadText() {
      const text = document.getElementById('outputText').value;
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'extracted-text.txt';
      a.click();
      showToast('Download started');
    }

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        ${message}
      `;
      document.body.appendChild(toast);

      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // Init
    renderLangOptions();
  </script>
</body>
</html>
