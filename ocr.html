<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR - Image to Text | All Languages</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }
   .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
   .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }
   .upload-area {
      background: #1e293b;
      border: 2px dashed #334155;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
   .upload-area:hover {
      border-color: #38bdf8;
      background: #1e293b80;
    }
   .upload-area.dragover {
      border-color: #38bdf8;
      background: #1e293b80;
    }
    input[type="file"] { display: none; }
   .btn {
      background: #0ea5e9;
      color: #0f172a;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      margin: 8px;
    }
   .btn:hover { background: #38bdf8; }
   .btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }
   .controls {
      margin: 20px 0;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    select {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 1rem;
    }
   .preview {
      margin: 20px 0;
      text-align: center;
    }
   .preview img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      border: 1px solid #334155;
    }
   .progress {
      background: #1e293b;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      display: none;
    }
   .progress-bar {
      background: #334155;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }
   .progress-fill {
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }
   .result {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      display: none;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.95rem;
      resize: vertical;
    }
   .back {
      color: #38bdf8;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 20px;
    }
   .note {
      background: #1e293b;
      border-left: 3px solid #38bdf8;
      padding: 12px 16px;
      margin: 20px 0;
      border-radius: 4px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to Tools</a>
    <h1>Image to Text OCR</h1>
    <p class="subtitle">Extract text from images. Supports 100+ languages. Runs locally in your browser.</p>

    <div class="note">
      <strong>Privacy:</strong> Your image never leaves your device. All processing happens in your browser.
    </div>

    <div class="upload-area" id="uploadArea">
      <p style="font-size: 1.1rem; margin-bottom: 10px;">Drop image here or click to upload</p>
      <p style="color: #64748b; font-size: 0.9rem;">PNG, JPG, WEBP supported</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls">
      <label>Language:</label>
      <select id="langSelect">
        <option value="eng">English</option>
        <option value="tel">Telugu</option>
        <option value="hin">Hindi</option>
        <option value="tam">Tamil</option>
        <option value="kan">Kannada</option>
        <option value="mal">Malayalam</option>
        <option value="eng+tel">English + Telugu</option>
        <option value="eng+hin">English + Hindi</option>
        <option value="eng+tel+hin">English + Telugu + Hindi</option>
        <option value="jpn">Japanese</option>
        <option value="chi_sim">Chinese Simplified</option>
        <option value="ara">Arabic</option>
        <option value="fra">French</option>
        <option value="deu">German</option>
        <option value="spa">Spanish</option>
      </select>
      <button class="btn" id="extractBtn" disabled>Extract Text</button>
    </div>

    <div class="preview" id="preview"></div>

    <div class="progress" id="progress">
      <div id="progressText">Starting OCR...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="result" id="result">
      <h3 style="margin-bottom: 15px;">Extracted Text:</h3>
      <textarea id="outputText" readonly></textarea>
      <button class="btn" onclick="copyText()">Copy Text</button>
      <button class="btn" onclick="downloadText()">Download.txt</button>
    </div>
  </div>

  <script>
    let selectedFile = null;
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const extractBtn = document.getElementById('extractBtn');
    const preview = document.getElementById('preview');
    const progress = document.getElementById('progress');
    const result = document.getElementById('result');

    uploadArea.onclick = () => fileInput.click();

    uploadArea.ondragover = (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    };
    uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
    uploadArea.ondrop = (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    };

    fileInput.onchange = (e) => {
      if (e.target.files.length) handleFile(e.target.files[0]);
    };

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('Please upload an image file');
        return;
      }
      selectedFile = file;
      extractBtn.disabled = false;

      const reader = new FileReader();
      reader.onload = (e) => {
        preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
      };
      reader.readAsDataURL(file);
      result.style.display = 'none';
    }

    extractBtn.onclick = async () => {
      if (!selectedFile) return;

      const lang = document.getElementById('langSelect').value;
      extractBtn.disabled = true;
      progress.style.display = 'block';
      result.style.display = 'none';

      try {
        const { data: { text } } = await Tesseract.recognize(
          selectedFile,
          lang,
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                const pct = Math.round(m.progress * 100);
                document.getElementById('progressText').textContent = `Recognizing text: ${pct}%`;
                document.getElementById('progressFill').style.width = pct + '%';
              } else {
                document.getElementById('progressText').textContent = m.status;
              }
            }
          }
        );

        document.getElementById('outputText').value = text;
        progress.style.display = 'none';
        result.style.display = 'block';
      } catch (err) {
        alert('OCR failed: ' + err.message);
        progress.style.display = 'none';
      }
      extractBtn.disabled = false;
    };

    function copyText() {
      const text = document.getElementById('outputText');
      text.select();
      document.execCommand('copy');
      alert('Copied to clipboard!');
    }

    function downloadText() {
      const text = document.getElementById('outputText').value;
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'extracted-text.txt';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
