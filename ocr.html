<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Pro - Image to Text</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }
  .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    h1 {
      font-size: 2rem; margin-bottom: 8px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
  .subtitle { color: #94a3b8; margin-bottom: 30px; }

  .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid #334155;
    }
  .tab {
      background: none;
      border: none;
      color: #94a3b8;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 1rem;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
  .tab.active {
      color: #38bdf8;
      border-bottom-color: #38bdf8;
    }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .upload-area {
      background: #1e293b; border: 2px dashed #334155; border-radius: 12px;
      padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
  .upload-area:hover,.upload-area.dragover { border-color: #38bdf8; background: #1e293b80; }
    input[type="file"] { display: none; }

  .url-input-group {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px;
      display: flex; gap: 10px;
    }
  .url-input-group input {
      flex: 1; background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      padding: 12px 16px; border-radius: 8px; font-size: 1rem;
    }
  .url-input-group input:focus { outline: none; border-color: #38bdf8; }

  .btn {
      background: #0ea5e9; color: #0f172a; border: none; padding: 12px 24px;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem;
      white-space: nowrap;
    }
  .btn:hover { background: #38bdf8; }
  .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  .controls { margin: 20px 0; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    select { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; }
  .checkbox { display: flex; align-items: center; gap: 8px; }
  .checkbox input { width: 18px; height: 18px; }

  .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
  .preview-box { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; }
  .preview-box h4 { margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem; }
  .preview-box img,.preview-box canvas { max-width: 100%; border-radius: 4px; }

  .progress { background: #1e293b; border-radius: 8px; padding: 20px; margin: 20px 0; display: none; }
  .progress-bar { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
  .progress-fill { background: linear-gradient(90deg, #38bdf8, #818cf8); height: 100%; width: 0%; transition: width 0.3s; }

  .result { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; margin: 20px 0; display: none; }
    textarea {
      width: 100%; min-height: 200px; background: #0f172a; border: 1px solid #334155;
      color: #e2e8f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.95rem; resize: vertical;
    }
  .back { color: #38bdf8; text-decoration: none; display: inline-block; margin-bottom: 20px; }
  .error { background: #7f1d1d; border: 1px solid #dc2626; color: #fecaca; padding: 12px 16px; border-radius: 8px; margin: 15px 0; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to Tools</a>
    <h1>OCR Pro</h1>
    <p class="subtitle">High accuracy text extraction with image preprocessing</p>

    <div class="tabs">
      <button class="tab active" data-tab="upload">Upload File</button>
      <button class="tab" data-tab="url">From URL</button>
    </div>

    <div class="tab-content active" id="upload-tab">
      <div class="upload-area" id="uploadArea">
        <p style="font-size: 1.1rem; margin-bottom: 10px;">Drop image here or click to upload</p>
        <p style="color: #64748b; font-size: 0.9rem;">PNG, JPG, WEBP. Max 10MB</p>
        <input type="file" id="fileInput" accept="image/*">
      </div>
    </div>

    <div class="tab-content" id="url-tab">
      <div class="url-input-group">
        <input type="url" id="urlInput" placeholder="https://example.com/image.jpg">
        <button class="btn" id="loadUrlBtn">Load Image</button>
      </div>
      <div class="error" id="urlError"></div>
    </div>

    <div class="controls">
      <label>Language:</label>
      <select id="langSelect">
        <option value="eng+tel">English + Telugu</option>
        <option value="eng">English</option>
        <option value="tel">Telugu</option>
        <option value="hin">Hindi</option>
        <option value="eng+hin">English + Hindi</option>
        <option value="tam">Tamil</option>
        <option value="kan">Kannada</option>
      </select>

      <div class="checkbox">
        <input type="checkbox" id="preprocess" checked>
        <label for="preprocess">Enhance image</label>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="upscale" checked>
        <label for="upscale">2x Upscale</label>
      </div>

      <button class="btn" id="extractBtn" disabled>Extract Text</button>
    </div>

    <div class="preview-grid" id="previewGrid" style="display:none;">
      <div class="preview-box">
        <h4>Original</h4>
        <div id="originalPreview"></div>
      </div>
      <div class="preview-box">
        <h4>Processed</h4>
        <canvas id="processedCanvas"></canvas>
      </div>
    </div>

    <div class="progress" id="progress">
      <div id="progressText">Starting OCR...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="result" id="result">
      <h3 style="margin-bottom: 15px;">Extracted Text:</h3>
      <textarea id="outputText" readonly></textarea>
      <button class="btn" onclick="copyText()">Copy Text</button>
      <button class="btn" onclick="downloadText()">Download.txt</button>
    </div>
  </div>

  <script>
    let selectedImageBlob = null;
    let processedImageBlob = null;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
        resetState();
      };
    });

    function resetState() {
      selectedImageBlob = null;
      processedImageBlob = null;
      document.getElementById('extractBtn').disabled = true;
      document.getElementById('previewGrid').style.display = 'none';
      document.getElementById('result').style.display = 'none';
      document.getElementById('urlError').style.display = 'none';
    }

    // File upload
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    uploadArea.onclick = () => fileInput.click();
    uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); };
    uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
    uploadArea.ondrop = (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => { if (e.target.files.length) handleFile(e.target.files[0]); };

    function handleFile(file) {
      if (!file.type.startsWith('image/')) return alert('Please upload an image');
      if (file.size > 10 * 1024) return alert('Max 10MB');
      selectedImageBlob = file;
      processImage(URL.createObjectURL(file));
    }

    // URL input
    document.getElementById('loadUrlBtn').onclick = async () => {
      const url = document.getElementById('urlInput').value.trim();
      const errorDiv = document.getElementById('urlError');
      errorDiv.style.display = 'none';

      if (!url) return showUrlError('Please enter an image URL');

      try {
        document.getElementById('loadUrlBtn').disabled = true;
        document.getElementById('loadUrlBtn').textContent = 'Loading...';

        const response = await fetch(url);
        if (!response.ok) throw new Error('Failed to fetch image');

        const blob = await response.blob();
        if (!blob.type.startsWith('image/')) throw new Error('URL is not an image');

        selectedImageBlob = blob;
        processImage(URL.createObjectURL(blob));
      } catch (err) {
        showUrlError('Could not load image. Check URL or CORS policy. Try uploading instead.');
      } finally {
        document.getElementById('loadUrlBtn').disabled = false;
        document.getElementById('loadUrlBtn').textContent = 'Load Image';
      }
    };

    function showUrlError(msg) {
      const errorDiv = document.getElementById('urlError');
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    // Image processing
    async function processImage(src) {
      document.getElementById('originalPreview').innerHTML = `<img src="${src}">`;
      document.getElementById('previewGrid').style.display = 'grid';
      document.getElementById('extractBtn').disabled = false;
      document.getElementById('result').style.display = 'none';

      await preprocessImage(src);
    }

    async function preprocessImage(dataUrl) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const canvas = document.getElementById('processedCanvas');
        const ctx = canvas.getContext('2d');
        let scale = document.getElementById('upscale').checked? 2 : 1;
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        if (document.getElementById('preprocess').checked) {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            const contrast = 1.5;
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            const newVal = factor * (avg - 128) + 128;
            data[i] = data[i + 1] = data[i + 2] = newVal;
          }
          ctx.putImageData(imageData, 0, 0);
        }
        canvas.toBlob(blob => { processedImageBlob = blob; });
      };
      img.src = dataUrl;
    }

    // OCR
    document.getElementById('extractBtn').onclick = async () => {
      if (!processedImageBlob) return;
      const lang = document.getElementById('langSelect').value;
      document.getElementById('extractBtn').disabled = true;
      document.getElementById('progress').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      try {
        const { data: { text } } = await Tesseract.recognize(
          processedImageBlob,
          lang,
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                const pct = Math.round(m.progress * 100);
                document.getElementById('progressText').textContent = `Recognizing: ${pct}%`;
                document.getElementById('progressFill').style.width = pct + '%';
              } else {
                document.getElementById('progressText').textContent = m.status;
              }
            },
            tessedit_pageseg_mode: Tesseract.PSM.AUTO,
            tessedit_ocr_engine_mode: Tesseract.OEM.LSTM_ONLY,
            preserve_interword_spaces: '1',
          }
        );
        document.getElementById('outputText').value = text.trim();
        document.getElementById('progress').style.display = 'none';
        document.getElementById('result').style.display = 'block';
      } catch (err) {
        alert('OCR failed: ' + err.message);
        document.getElementById('progress').style.display = 'none';
      }
      document.getElementById('extractBtn').disabled = false;
    };

    document.getElementById('preprocess').onchange = document.getElementById('upscale').onchange = () => {
      if (selectedImageBlob) processImage(URL.createObjectURL(selectedImageBlob));
    };

    function copyText() {
      const text = document.getElementById('outputText');
      text.select();
      document.execCommand('copy');
      alert('Copied!');
    }
    function downloadText() {
      const text = document.getElementById('outputText').value;
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'extracted-text.txt';
      a.click();
    }
  </script>
</body>
</html>
