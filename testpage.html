<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Table Image → Excel</title>

<script src="https://cdn.tailwindcss.com"></script>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>

body{
    background:#111827;
    color:white;
    font-family:Arial;
}

.excel-table{
    border-collapse:collapse;
    background:white;
    color:black;
    width:max-content;
    min-width:100%;
}

.excel-table td,
.excel-table th{
    border:1px solid #d1d5db;
    min-width:120px;
    height:38px;
    padding:6px 10px;
    outline:none;
    position:relative;
}

.excel-table th{
    background:#f3f4f6;
    font-weight:bold;
}

.excel-table td:focus,
.excel-table th:focus{
    background:#dbeafe;
}

.excel-table td.selected{
    background:#bfdbfe;
}

#logs{
    background:#0f172a;
    color:#93c5fd;
    padding:12px;
    border-radius:10px;
    height:90px;
    overflow:auto;
    font-size:14px;
}

canvas{
    max-width:100%;
    border-radius:12px;
}

</style>
</head>
<body class="p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-4xl font-bold mb-2">
📊 Table Image → Excel
</h1>

<p class="text-slate-400 mb-6">
Extract tables locally and edit before export.
</p>

<input
type="file"
id="fileInput"
accept="image/*"
class="mb-5"
/>

<div class="grid md:grid-cols-2 gap-6">

<div>
<h2 class="text-2xl mb-3">
Original
</h2>

<img
id="preview"
class="rounded-xl"
/>
</div>

<div>
<h2 class="text-2xl mb-3">
Detected Table
</h2>

<canvas id="canvas"></canvas>
</div>

</div>

<div class="flex flex-wrap gap-4 mt-6">

<button
id="extractBtn"
class="bg-sky-500 hover:bg-sky-600 px-6 py-3 rounded-xl">
Extract Table
</button>

<button
id="mergeBtn"
class="bg-purple-500 hover:bg-purple-600 px-6 py-3 rounded-xl">
Merge Selected Cells
</button>

<button
id="downloadBtn"
class="bg-emerald-500 hover:bg-emerald-600 px-6 py-3 rounded-xl">
Download Excel
</button>

</div>

<div class="mt-5">

<div id="logs">
Ready
</div>

</div>

<div class="mt-8 overflow-auto bg-slate-900 p-4 rounded-2xl">

<table
id="tableOutput"
class="excel-table">
</table>

</div>

</div>

<script>

let uploadedFile = null;
let extractedTable = [];
let selectedCells = [];

const fileInput =
document.getElementById('fileInput');

const preview =
document.getElementById('preview');

const canvas =
document.getElementById('canvas');

const ctx =
canvas.getContext('2d');

const tableOutput =
document.getElementById('tableOutput');

const logs =
document.getElementById('logs');

function setLog(message){

    logs.innerHTML = message;
}

fileInput.addEventListener('change', e=>{

    uploadedFile = e.target.files[0];

    if(!uploadedFile) return;

    const reader = new FileReader();

    reader.onload = ev=>{

        preview.src = ev.target.result;

        setLog('Image loaded successfully');
    };

    reader.readAsDataURL(uploadedFile);
});

document
.getElementById('extractBtn')
.addEventListener('click', async ()=>{

    if(!uploadedFile){

        alert('Upload image first');

        return;
    }

    setLog('Preparing image');

    const img = new Image();

    img.src =
    URL.createObjectURL(uploadedFile);

    img.onload = async ()=>{

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img,0,0);

        let src = cv.imread(canvas);

        let gray = new cv.Mat();

        cv.cvtColor(
            src,
            gray,
            cv.COLOR_RGBA2GRAY
        );

        let binary = new cv.Mat();

        cv.adaptiveThreshold(
            gray,
            binary,
            255,
            cv.ADAPTIVE_THRESH_GAUSSIAN_C,
            cv.THRESH_BINARY_INV,
            15,
            8
        );

        setLog('Detecting table structure');

        let horizontal =
        binary.clone();

        let vertical =
        binary.clone();

        let horizontalSize =
        Math.floor(
            horizontal.cols / 20
        );

        let verticalSize =
        Math.floor(
            vertical.rows / 20
        );

        let horizontalStructure =
        cv.getStructuringElement(
            cv.MORPH_RECT,
            new cv.Size(
                horizontalSize,
                1
            )
        );

        let verticalStructure =
        cv.getStructuringElement(
            cv.MORPH_RECT,
            new cv.Size(
                1,
                verticalSize
            )
        );

        cv.erode(
            horizontal,
            horizontal,
            horizontalStructure
        );

        cv.dilate(
            horizontal,
            horizontal,
            horizontalStructure
        );

        cv.erode(
            vertical,
            vertical,
            verticalStructure
        );

        cv.dilate(
            vertical,
            vertical,
            verticalStructure
        );

        let mask =
        new cv.Mat();

        cv.add(
            horizontal,
            vertical,
            mask
        );

        let contours =
        new cv.MatVector();

        let hierarchy =
        new cv.Mat();

        cv.findContours(
            mask,
            contours,
            hierarchy,
            cv.RETR_TREE,
            cv.CHAIN_APPROX_SIMPLE
        );

        let cells = [];

        for(let i=0;i<contours.size();i++){

            let rect =
            cv.boundingRect(
                contours.get(i)
            );

            // aggressive filtering

            const valid =
                rect.width > 60 &&
                rect.height > 25 &&
                rect.width < canvas.width*0.9 &&
                rect.height < 120;

            if(valid){

                cells.push(rect);

                cv.rectangle(
                    src,
                    new cv.Point(
                        rect.x,
                        rect.y
                    ),
                    new cv.Point(
                        rect.x+rect.width,
                        rect.y+rect.height
                    ),
                    [0,255,0,255],
                    2
                );
            }
        }

        cv.imshow(canvas,src);

        setLog('Organizing rows');

        cells.sort((a,b)=>{

            if(
                Math.abs(a.y-b.y) < 10
            ){
                return a.x-b.x;
            }

            return a.y-b.y;
        });

        let rows = [];
        let currentRow = [];

        let lastY = -1;

        cells.forEach(cell=>{

            if(
                lastY === -1 ||
                Math.abs(cell.y-lastY)<15
            ){

                currentRow.push(cell);

            }else{

                rows.push(currentRow);

                currentRow=[cell];
            }

            lastY = cell.y;
        });

        if(currentRow.length){
            rows.push(currentRow);
        }

        extractedTable = [];

        setLog('Extracting text');

        for(let r=0;r<rows.length;r++){

            let rowData = [];

            rows[r].sort(
                (a,b)=>a.x-b.x
            );

            for(let c=0;c<rows[r].length;c++){

                await new Promise(
                    r=>setTimeout(r,10)
                );

                let rect =
                rows[r][c];

                let roi =
                gray.roi(rect);

                let tempCanvas =
                document.createElement(
                    'canvas'
                );

                cv.imshow(
                    tempCanvas,
                    roi
                );

                const {
                    data:{text}
                } =
                await Tesseract.recognize(
                    tempCanvas,
                    'eng'
                );

                rowData.push(
                    text.trim()
                );

                roi.delete();
            }

            extractedTable.push(rowData);
        }

        renderTable();

        setLog('Table ready for editing');

        src.delete();
        gray.delete();
        binary.delete();
        horizontal.delete();
        vertical.delete();
        mask.delete();
        contours.delete();
        hierarchy.delete();
    };
});

function renderTable(){

    tableOutput.innerHTML = '';

    extractedTable.forEach(
    (row,rowIndex)=>{

        const tr =
        document.createElement('tr');

        row.forEach(
        (cell,colIndex)=>{

            const td =
            document.createElement(
                rowIndex===0
                ? 'th'
                : 'td'
            );

            td.contentEditable = true;

            td.innerText = cell;

            td.dataset.row =
            rowIndex;

            td.dataset.col =
            colIndex;

            td.addEventListener(
                'input',
                ()=>{
                    extractedTable
                    [rowIndex]
                    [colIndex]
                    = td.innerText;
                }
            );

            td.addEventListener(
                'click',
                ()=>{

                    td.classList.toggle(
                        'selected'
                    );

                    if(
                        selectedCells
                        .includes(td)
                    ){

                        selectedCells =
                        selectedCells
                        .filter(
                            x=>x!==td
                        );

                    }else{

                        selectedCells
                        .push(td);
                    }
                }
            );

            tr.appendChild(td);
        });

        tableOutput.appendChild(tr);
    });
}

document
.getElementById('mergeBtn')
.addEventListener('click', ()=>{

    if(selectedCells.length < 2){

        alert(
        'Select at least 2 cells'
        );

        return;
    }

    const first =
    selectedCells[0];

    first.colSpan =
    selectedCells.length;

    let mergedText =
    selectedCells
    .map(
        c=>c.innerText
    )
    .join(' ');

    first.innerText =
    mergedText;

    for(let i=1;i<
        selectedCells.length;
        i++
    ){
        selectedCells[i].remove();
    }

    selectedCells.forEach(
        c=>c.classList.remove(
            'selected'
        )
    );

    selectedCells=[];

    setLog('Cells merged');
});

document
.getElementById('downloadBtn')
.addEventListener('click', ()=>{

    let finalData = [];

    const rows =
    tableOutput.querySelectorAll('tr');

    rows.forEach(row=>{

        let rowData = [];

        row.querySelectorAll(
            'th,td'
        ).forEach(cell=>{

            rowData.push(
                cell.innerText
            );
        });

        finalData.push(rowData);
    });

    const ws =
    XLSX.utils.aoa_to_sheet(
        finalData
    );

    const wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        'Sheet1'
    );

    XLSX.writeFile(
        wb,
        'table.xlsx'
    );

    setLog('Excel file downloaded');
});

</script>

</body>
</html>
