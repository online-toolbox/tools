<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Table Image → Excel Converter</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- OpenCV -->
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

  <!-- Tesseract -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    canvas {
      max-width: 100%;
      border-radius: 12px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    td, th {
      border: 1px solid #334155;
      padding: 8px;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="min-h-screen p-6">

  <div class="max-w-6xl mx-auto">

    <h1 class="text-4xl font-bold text-center mb-2">
      📊 Image Table → Excel
    </h1>

    <p class="text-center text-slate-400 mb-8">
      Fully local • No uploads • Free forever
    </p>

    <!-- Upload -->
    <div class="bg-slate-800 rounded-2xl p-8">

      <input
        type="file"
        id="fileInput"
        accept="image/*"
        class="mb-4"
      />

      <div class="grid md:grid-cols-2 gap-6">

        <!-- Original -->
        <div>
          <h2 class="text-xl font-semibold mb-3">
            Original Image
          </h2>

          <img
            id="preview"
            class="rounded-xl hidden w-full"
          />
        </div>

        <!-- Processed -->
        <div>
          <h2 class="text-xl font-semibold mb-3">
            Processed Table
          </h2>

          <canvas id="canvas"></canvas>
        </div>

      </div>

      <!-- Buttons -->
      <div class="flex gap-4 mt-6">

        <button
          id="extractBtn"
          class="bg-sky-500 hover:bg-sky-600 px-6 py-3 rounded-xl font-semibold"
        >
          Extract Table
        </button>

        <button
          id="downloadBtn"
          class="bg-emerald-500 hover:bg-emerald-600 px-6 py-3 rounded-xl font-semibold"
        >
          Download Excel
        </button>

      </div>

      <!-- Status -->
      <div class="flex items-center gap-3 mt-5">

        <div id="loader" class="loader hidden"></div>

        <p id="status" class="text-slate-300"></p>

      </div>

    </div>

    <!-- Table -->
    <div class="mt-8 bg-slate-800 rounded-2xl p-6 overflow-auto">

      <h2 class="text-2xl font-semibold mb-4">
        Extracted Table
      </h2>

      <table id="tableOutput"></table>

    </div>

  </div>

<script>
let uploadedImage = null;
let extractedData = [];

const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const extractBtn = document.getElementById('extractBtn');
const downloadBtn = document.getElementById('downloadBtn');

const tableOutput = document.getElementById('tableOutput');

const statusText = document.getElementById('status');
const loader = document.getElementById('loader');

function setStatus(text) {
  statusText.innerText = text;
}

function showLoader(show) {
  loader.classList.toggle('hidden', !show);
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];

  if (!file) return;

  uploadedImage = file;

  const reader = new FileReader();

  reader.onload = function(event) {
    preview.src = event.target.result;
    preview.classList.remove('hidden');
  };

  reader.readAsDataURL(file);
});

extractBtn.addEventListener('click', async () => {

  if (!uploadedImage) {
    alert('Please upload an image.');
    return;
  }

  showLoader(true);

  try {

    setStatus('Loading image...');

    const image = new Image();

    image.src = URL.createObjectURL(uploadedImage);

    image.onload = async () => {

      canvas.width = image.width;
      canvas.height = image.height;

      ctx.drawImage(image, 0, 0);

      setStatus('Processing table structure...');

      // OpenCV processing
      let src = cv.imread(canvas);
      let gray = new cv.Mat();

      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      let binary = new cv.Mat();

      cv.adaptiveThreshold(
        gray,
        binary,
        255,
        cv.ADAPTIVE_THRESH_GAUSSIAN_C,
        cv.THRESH_BINARY_INV,
        15,
        10
      );

      // Detect horizontal lines
      let horizontal = binary.clone();
      let horizontalSize = Math.floor(horizontal.cols / 20);

      let horizontalStructure = cv.getStructuringElement(
        cv.MORPH_RECT,
        new cv.Size(horizontalSize, 1)
      );

      cv.erode(horizontal, horizontal, horizontalStructure);
      cv.dilate(horizontal, horizontal, horizontalStructure);

      // Detect vertical lines
      let vertical = binary.clone();
      let verticalSize = Math.floor(vertical.rows / 20);

      let verticalStructure = cv.getStructuringElement(
        cv.MORPH_RECT,
        new cv.Size(1, verticalSize)
      );

      cv.erode(vertical, vertical, verticalStructure);
      cv.dilate(vertical, vertical, verticalStructure);

      // Combine
      let mask = new cv.Mat();

      cv.add(horizontal, vertical, mask);

      cv.imshow(canvas, mask);

      setStatus('Running OCR...');

      const {
        data: { text }
      } = await Tesseract.recognize(
        canvas,
        'eng'
      );

      extractedData = parseTable(text);

      renderTable(extractedData);

      setStatus('Done ✅');

      src.delete();
      gray.delete();
      binary.delete();
      horizontal.delete();
      vertical.delete();
      mask.delete();

      showLoader(false);
    };

  } catch (err) {

    console.error(err);

    alert('Extraction failed.');

    setStatus('Error ❌');

    showLoader(false);
  }
});

function parseTable(text) {

  const lines = text
    .split('\n')
    .filter(line => line.trim() !== '');

  return lines.map(line =>
    line
      .split(/\s{2,}|\t|\|/)
      .filter(cell => cell.trim() !== '')
  );
}

function renderTable(data) {

  tableOutput.innerHTML = '';

  data.forEach((row, rowIndex) => {

    const tr = document.createElement('tr');

    row.forEach(cell => {

      const td = document.createElement(
        rowIndex === 0 ? 'th' : 'td'
      );

      td.innerText = cell;

      tr.appendChild(td);
    });

    tableOutput.appendChild(tr);
  });
}

downloadBtn.addEventListener('click', () => {

  if (!extractedData.length) {
    alert('No data found.');
    return;
  }

  const ws = XLSX.utils.aoa_to_sheet(extractedData);

  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    wb,
    ws,
    'TableData'
  );

  XLSX.writeFile(
    wb,
    'table-data.xlsx'
  );
});
</script>

</body>
</html>
