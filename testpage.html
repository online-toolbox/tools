<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Table Image → Excel (Improved)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
}

table{
    border-collapse:collapse;
    background:white;
    color:black;
}

td,th{
    border:1px solid #d1d5db;
    min-width:120px;
    height:38px;
    padding:6px;
}

td:focus{
    background:#dbeafe;
    outline:none;
}

#status{
    margin-top:10px;
    color:#38bdf8;
}
</style>
</head>

<body class="p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-bold mb-4">
Table Image → Excel (Better Grid Detection)
</h1>

<input type="file" id="fileInput" class="mb-4">

<img id="preview" class="mb-4 rounded-xl max-w-md">

<canvas id="canvas"></canvas>

<div class="flex gap-4 mt-4">
<button id="extractBtn" class="bg-sky-500 px-4 py-2 rounded">
Extract
</button>

<button id="downloadBtn" class="bg-green-500 px-4 py-2 rounded">
Download Excel
</button>
</div>

<div id="status">Ready</div>

<table id="table"></table>

</div>

<script>

let imgFile;
let tableData = [];

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const table = document.getElementById("table");
const statusEl = document.getElementById("status");

fileInput.onchange = e => {
    imgFile = e.target.files[0];
    preview.src = URL.createObjectURL(imgFile);
    statusEl.innerText = "Image loaded";
};

function setStatus(t){
    statusEl.innerText = t;
}

document.getElementById("extractBtn").onclick = async () => {

if(!imgFile) return;

setStatus("Processing image...");

let img = new Image();
img.src = URL.createObjectURL(imgFile);

img.onload = async () => {

canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img,0,0);

let src = cv.imread(canvas);
let gray = new cv.Mat();

cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

// invert + threshold
let binary = new cv.Mat();
cv.adaptiveThreshold(
    gray,
    binary,
    255,
    cv.ADAPTIVE_THRESH_MEAN_C,
    cv.THRESH_BINARY_INV,
    15,
    10
);

// ===== detect horizontal lines =====
let horizontal = binary.clone();
let horizontalSize = Math.floor(horizontal.cols / 30);
let horizontalStructure = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(horizontalSize,1));
cv.erode(horizontal, horizontal, horizontalStructure);
cv.dilate(horizontal, horizontal, horizontalStructure);

// ===== vertical lines =====
let vertical = binary.clone();
let verticalSize = Math.floor(vertical.rows / 30);
let verticalStructure = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(1,verticalSize));
cv.erode(vertical, vertical, verticalStructure);
cv.dilate(vertical, vertical, verticalStructure);

// combine grid
let grid = new cv.Mat();
cv.add(horizontal, vertical, grid);

// find intersections
let contours = new cv.MatVector();
let hierarchy = new cv.Mat();

cv.findContours(grid, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

let points = [];

for(let i=0;i<contours.size();i++){
    let r = cv.boundingRect(contours.get(i));

    if(r.width < 50 && r.height < 50){
        points.push({x:r.x, y:r.y});
    }
}

// sort points
points.sort((a,b)=>a.y-b.y || a.x-b.x);

// build rows
let rows = [];
let current = [];
let lastY = -1;

for(let p of points){

    if(lastY === -1 || Math.abs(p.y - lastY) < 20){
        current.push(p);
    } else {
        rows.push(current);
        current = [p];
    }

    lastY = p.y;
}

if(current.length) rows.push(current);

// build grid cells
tableData = [];

setStatus("Extracting text...");

for(let r=0;r<rows.length-1;r++){

    let row = [];

    for(let c=0;c<rows[r].length-1;c++){

        let x1 = rows[r][c].x;
        let y1 = rows[r][c].y;
        let x2 = rows[r][c+1].x;
        let y2 = rows[r+1][c].y;

        let roi = src.roi(new cv.Rect(x1,y1,x2-x1,y2-y1));

        let tempCanvas = document.createElement("canvas");
        cv.imshow(tempCanvas, roi);

        let result = await Tesseract.recognize(tempCanvas,'eng');
        let text = result.data.text.trim();

        row.push(text);

        roi.delete();
    }

    tableData.push(row);
}

render();

setStatus("Done");
};

};

function render(){

table.innerHTML = "";

tableData.forEach((row,r)=>{

    let tr = document.createElement("tr");

    row.forEach((cell,c)=>{

        let td = document.createElement(r===0 ? "th":"td");
        td.contentEditable = true;
        td.innerText = cell;

        td.oninput = () => {
            tableData[r][c] = td.innerText;
        };

        tr.appendChild(td);
    });

    table.appendChild(tr);
});

}

document.getElementById("downloadBtn").onclick = () => {

let ws = XLSX.utils.aoa_to_sheet(tableData);
let wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "Sheet1");

XLSX.writeFile(wb, "table.xlsx");

};

</script>

</body>
</html>
