<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to Excel - OCR Table Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 2rem; margin-bottom: 8px; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: #94a3b8; margin-bottom: 30px; }
.upload-area { background: #1e293b; border: 2px dashed #334155; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: all 0.2s; }
.upload-area:hover,.upload-area.dragover { border-color: #38bdf8; background: #1e293b80; }
  #imgPreview { margin-top: 15px; }
  #imgPreview img { max-height: 200px; border-radius: 8px; }
    input[type="file"] { display: none; }
.btn { background: #0ea5e9; color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
.btn:hover { background: #38bdf8; }
.btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
.btn.secondary { background: #334155; color: #e2e8f0; }
.controls { margin: 20px 0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
.progress { background: #1e293b; border-radius: 8px; padding: 20px; margin: 20px 0; display: none; }
.progress-bar { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
.progress-fill { background: linear-gradient(90deg, #38bdf8, #818cf8); height: 100%; width: 0%; transition: width 0.3s; }
.result { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; margin: 20px 0; display: none; }
.result-actions { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
.table-preview { background: #fff; border: 2px solid #d1d5db; border-radius: 6px; overflow: auto; max-height: 500px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; font-family: 'Segoe UI', sans-serif; }
    td { padding: 6px 10px; border: 1px solid #d1d5db; text-align: left; color: #111827; background: #fff; }
    td.editable:focus { outline: 2px solid #38bdf8; background: #e0f2fe; }
.tip { background: #1e293b; border-left: 3px solid #22c55e; padding: 12px 16px; margin: 20px 0; border-radius: 4px; font-size: 0.9rem; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; border: 1px solid #38bdf8; color: #e2e8f0; padding: 14px 24px; border-radius: 8px; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Image to Excel Converter</h1>
    <p class="subtitle">Paste, drop, or upload — extracts tables to Excel. Works offline after first load.</p>

    <div class="tip"><strong>Ctrl+V to paste screenshot.</strong> Auto-detects columns. Handles merged cells.</div>

    <div class="upload-area" id="uploadArea">
      <p style="font-size: 1.1rem; margin-bottom: 10px;">Drop image here, paste with Ctrl+V, or click to upload</p>
      <p style="color: #64748b; font-size: 0.9rem;">PNG, JPG, WEBP • Max 10MB</p>
      <input type="file" id="fileInput" accept="image/*">
      <div id="imgPreview"></div>
    </div>

    <div class="controls">
      <button class="btn" id="extractBtn" disabled>Convert to Excel</button>
      <span id="status" style="color:#22c55e;font-size:0.9rem">Ready</span>
    </div>

    <div class="progress" id="progress">
      <div id="progressText">Starting...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="result" id="result">
      <div class="result-actions">
        <button class="btn" onclick="copyTSV()">Copy</button>
        <button class="btn secondary" onclick="downloadCSV()">Download CSV</button>
        <button class="btn secondary" onclick="downloadXLSX()">Download Excel</button>
      </div>
      <div class="table-preview" id="tablePreview"></div>
    </div>
  </div>

<script>
let selectedImageBlob = null;
let extractedTableData = [];

// Paste works anywhere
window.addEventListener('paste', e => {
  const file = [...e.clipboardData.items].find(i => i.type.startsWith('image/'))?.getAsFile();
  if (file) handleFile(file);
});

// Click/drag handlers - these stay attached
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
uploadArea.onclick = () => fileInput.click();
uploadArea.ondrop = e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
};
uploadArea.ondragover = e => { e.preventDefault(); uploadArea.classList.add('dragover'); };
uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
fileInput.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };

function handleFile(file) {
  if (!file.type.startsWith('image/')) return showToast('Please upload an image');
  if (file.size > 10 * 1024 * 1024) return showToast('Max 10MB');
  selectedImageBlob = file;
  document.getElementById('imgPreview').innerHTML = `<img src="${URL.createObjectURL(file)}">`;
  document.getElementById('extractBtn').disabled = false;
  document.getElementById('result').style.display = 'none';
}

document.getElementById('extractBtn').onclick = async () => {
  if (!selectedImageBlob) return;

  document.getElementById('extractBtn').disabled = true;
  document.getElementById('progress').style.display = 'block';
  document.getElementById('progressText').textContent = 'Running OCR...';
  document.getElementById('progressFill').style.width = '20%';

  try {
    const { data } = await Tesseract.recognize(selectedImageBlob, 'eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const p = Math.round(m.progress * 70) + 20;
          document.getElementById('progressFill').style.width = p + '%';
        }
      }
    });

    document.getElementById('progressText').textContent = 'Reconstructing table...';
    document.getElementById('progressFill').style.width = '90%';

    // Smart column detection - groups words by X position automatically
    extractedTableData = reconstructTable(data);

    renderTable();
    document.getElementById('progress').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    showToast('Converted successfully');

  } catch (err) {
    showToast('OCR failed: ' + err.message);
    document.getElementById('progress').style.display = 'none';
  }
  document.getElementById('extractBtn').disabled = false;
};

// This is the "better" part - auto clusters words into columns without gap slider
function reconstructTable(data) {
  const words = data.words.filter(w => w.text.trim());
  if (!words.length) return [];

  // Group by line first using Y coordinates
  const lines = [];
  const lineThreshold = 15;
  words.sort((a,b) => a.bbox.y0 - b.bbox.y0);

  words.forEach(w => {
    const y = w.bbox.y0;
    let line = lines.find(l => Math.abs(l.y - y) < lineThreshold);
    if (!line) {
      line = { y, words: [] };
      lines.push(line);
    }
    line.words.push(w);
  });

  // Find all X positions to detect columns
  const xPositions = [];
  lines.forEach(line => {
    line.words.forEach(w => {
      const x = Math.round(w.bbox.x0 / 10) * 10; // Round to 10px
      if (!xPositions.includes(x)) xPositions.push(x);
    });
  });
  xPositions.sort((a,b) => a - b);

  // Cluster close X positions into columns - this replaces your gap slider
  const columns = [];
  const colGap = 30; // Auto gap
  xPositions.forEach(x => {
    const lastCol = columns[columns.length - 1];
    if (!lastCol || x - lastCol > colGap) {
      columns.push(x);
    }
  });

  // Build 2D array
  const table = lines.map(line => {
    const row = new Array(columns.length).fill('');
    line.words.forEach(w => {
      const x = w.bbox.x0;
      const colIdx = columns.findIndex((cx, i) => {
        const nextCx = columns[i + 1] || Infinity;
        return x >= cx - colGap/2 && x < nextCx - colGap/2;
      });
      if (colIdx >= 0) {
        row[colIdx] = (row[colIdx]? row[colIdx] + ' ' : '') + w.text;
      }
    });
    return row;
  });

  // Remove empty columns
  const hasData = table[0].map((_, c) => table.some(row => row[c]));
  return table.map(row => row.filter((_, c) => hasData[c]));
}

function renderTable() {
  const preview = document.getElementById('tablePreview');
  if (!extractedTableData.length) {
    preview.innerHTML = '<p style="padding:20px;color:#6b7280">No text detected</p>';
    return;
  }
  let html = '<table><tbody>';
  extractedTableData.forEach(row => {
    html += '<tr>';
    row.forEach(cell => {
      html += `<td class="editable" contenteditable>${cell||''}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  preview.innerHTML = html;

  document.querySelectorAll('td.editable').forEach((cell, idx) => {
    cell.onblur = () => {
      const cols = extractedTableData[0].length;
      const r = Math.floor(idx / cols);
      const c = idx % cols;
      extractedTableData[r][c] = cell.textContent;
    };
  });
}

function copyTSV() {
  navigator.clipboard.writeText(extractedTableData.map(r => r.join('\t')).join('\n'));
  showToast('Copied — paste into Excel');
}

function downloadCSV() {
  const csv = extractedTableData.map(r =>
    r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')
  ).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'table.csv';
  a.click();
}

function downloadXLSX() {
  const ws = XLSX.utils.aoa_to_sheet(extractedTableData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, 'table.xlsx');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}
</script>
</body>
</html>
