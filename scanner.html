<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table OCR - Final</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script async src="./vendor/opencv.js" id="opencv"></script>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;padding:20px}
.container{max-width:1400px;margin:0 auto}
h1{font-size:2rem;margin-bottom:20px}
.upload{border:2px dashed #334155;padding:40px;text-align:center;border-radius:12px;cursor:pointer;margin-bottom:20px}
.upload:hover{border-color:#38bdf8}
input{display:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0}
.panel{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:15px}
img,canvas{max-width:100%;border-radius:4px}
.btn{background:#0ea5e9;color:#0f172a;border:none;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;margin-right:10px}
.btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.controls{display:flex;gap:15px;align-items:center;margin:20px 0;flex-wrap:wrap}
#logs{background:#000;color:#22c55e;height:200px;overflow:auto;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;margin-top:20px}
table{width:100%;border-collapse:collapse;background:#fff;color:#000}
td,th{border:1px solid #ccc;padding:6px}
</style>
</head>
<body>
<div class="container">
<h1>Table OCR - Final Version</h1>
<div class="upload" onclick="document.getElementById('file').click()">
  <p>Click or paste image with Ctrl+V</p>
  <input type="file" id="file" accept="image/*">
</div>

<div class="grid">
  <div class="panel"><h4>Original</h4><img id="img"></div>
  <div class="panel"><h4>Processed + Grid</h4><canvas id="canvas"></canvas></div>
</div>

<div class="controls">
  <button class="btn" id="runBtn" disabled>Extract</button>
  <button class="btn" onclick="downloadXLSX()">Download Excel</button>
  <span id="status">Loading OpenCV...</span>
</div>

<div id="logs"></div>
<div style="background:#fff;border-radius:8px;margin-top:20px;overflow:auto;max-height:500px">
  <table id="output"></table>
</div>
</div>

<script>
let file = null, cvReady = false, table = [];
const logs = document.getElementById('logs');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function log(msg, c='#94a3b8') {
  logs.innerHTML += `<div style="color:${c}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  logs.scrollTop = logs.scrollHeight;
}

// OpenCV init
var Module = {
  onRuntimeInitialized() {
    cvReady = true;
    document.getElementById('status').innerText = 'Ready';
    document.getElementById('status').style.color = '#22c55e';
    document.getElementById('runBtn').disabled =!file;
    log('OpenCV ready', '#22c55e');
  }
};

window.addEventListener('paste', e => {
  const f = [...e.clipboardData.items].find(i => i.type.startsWith('image/'))?.getAsFile();
  if (f) handleFile(f);
});

document.getElementById('file').onchange = e => e.target.files[0] && handleFile(e.target.files[0]);

function handleFile(f) {
  file = f;
  document.getElementById('img').src = URL.createObjectURL(f);
  document.getElementById('runBtn').disabled =!cvReady;
  log('Image loaded: ' + f.name);
}

document.getElementById('runBtn').onclick = async () => {
  if (!file) return;
  logs.innerHTML = '';
  log('Starting...');

  const img = document.getElementById('img');
  await new Promise(r => img.complete? r() : img.onload = r);

  // STEP 1: Heavy preprocessing for transparent/bad text
  let src = cv.imread(img);
  let processed = preprocessForOCR(src);
  cv.imshow(canvas, processed);
  log('Preprocessing done: contrast + denoise + sharpen', '#22c55e');

  // STEP 2: Detect grid
  const cells = detectCells(processed.clone());
  log(`Detected ${cells.length} cells`, '#22c55e');

  // Draw grid overlay
  cells.forEach(c => cv.rectangle(processed, new cv.Point(c.x, c.y), new cv.Point(c.x + c.w, c.y + c.h), [0, 255, 0, 255], 2));
  cv.imshow(canvas, processed);

  // STEP 3: OCR each cell with DPI boost
  table = await ocrCells(cells, src);

  renderTable();
  log('Complete', '#22c55e');

  src.delete(); processed.delete();
};

// KEY FIX: Preprocess specifically for transparent/low-contrast text
function preprocessForOCR(src) {
  let gray = new cv.Mat();
  let enhanced = new cv.Mat();
  let sharpened = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

  // 1. Upscale 2x - Tesseract needs 300+ DPI
  const scale = 2.0;
  cv.resize(gray, gray, new cv.Size(gray.cols * scale, gray.rows * scale), 0, 0, cv.INTER_CUBIC);

  // 2. CLAHE - fixes low contrast/transparent text
  let clahe = new cv.CLAHE(3.0, new cv.Size(8, 8));
  clahe.apply(gray, enhanced);
  clahe.delete();

  // 3. Sharpen - fixes blurry/anti-aliased text
  let kernel = cv.matFromArray(3, 3, cv.CV_32F, [0, -1, 0, -1, 5, -1, 0, -1, 0]);
  cv.filter2D(enhanced, sharpened, -1, kernel);
  kernel.delete();

  // 4. Adaptive threshold - handles gradients
  let binary = new cv.Mat();
  cv.adaptiveThreshold(sharpened, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 11, 2);

  gray.delete(); enhanced.delete(); sharpened.delete();
  return binary;
}

function detectCells(bin) {
  const horizontal = bin.clone();
  const vertical = bin.clone();
  const hKernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(40, 1));
  const vKernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(1, 40));
  cv.morphologyEx(horizontal, horizontal, cv.MORPH_OPEN, hKernel);
  cv.morphologyEx(vertical, vertical, cv.MORPH_OPEN, vKernel);

  let grid = new cv.Mat();
  cv.add(horizontal, vertical, grid);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();
  cv.findContours(grid, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

  const cells = [];
  for (let i = 0; i < contours.size(); i++) {
    const rect = cv.boundingRect(contours.get(i));
    // Account for 2x upscale
    const r = { x: rect.x/2, y: rect.y/2, w: rect.width/2, h: rect.height/2 };
    if (r.w > 20 && r.h > 15 && r.w < bin.cols) cells.push(r);
  }

  horizontal.delete(); vertical.delete(); grid.delete(); contours.delete(); hierarchy.delete(); hKernel.delete(); vKernel.delete(); bin.delete();
  return cells;
}

async function ocrCells(cells, src) {
  if (!cells.length) {
    log('No cells found. Using full-page OCR', '#fbbf24');
    const { data } = await Tesseract.recognize(file, 'eng');
    return data.text.split('\n').filter(l => l.trim()).map(l => [l]);
  }

  // Sort into rows
  cells.sort((a,b) => a.y - b.y || a.x - b.x);
  const rows = [];
  const yTol = 20;
  cells.forEach(c => {
    let row = rows.find(r => Math.abs(r.y - c.y) < yTol);
    if (!row) { row = { y: c.y, cells: [] }; rows.push(row); }
    row.cells.push(c);
  });
  rows.forEach(r => r.cells.sort((a,b) => a.x - b.x));

  const worker = await Tesseract.createWorker('eng', 1, {
    logger: m => m.status === 'recognizing text' && log(`OCR: ${Math.round(m.progress*100)}%`)
  });

  // Critical: PSM 7 = single line, best for cells
  await worker.setParameters({
    tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz.,$%- '
  });

  const out = [];
  for (let i = 0; i < rows.length; i++) {
    const row = [];
    for (const c of rows[i].cells) {
      const roi = src.roi(new cv.Rect(c.x, c.y, c.w, c.h));
      const temp = document.createElement('canvas');
      cv.imshow(temp, roi);
      // Upscale ROI 3x for tiny text
      const scaled = document.createElement('canvas');
      scaled.width = c.w * 3;
      scaled.height = c.h * 3;
      scaled.getContext('2d').drawImage(temp, 0, 0, scaled.width, scaled.height);

      const { data: { text } } = await worker.recognize(scaled);
      row.push(text.trim());
      log(`[${i+1}] ${text.trim()}`);
      roi.delete();
    }
    out.push(row);
  }
  await worker.terminate();
  return out;
}

function renderTable() {
  const out = document.getElementById('output');
  out.innerHTML = '';
  table.forEach((row, r) => {
    const tr = document.createElement('tr');
    row.forEach(cell => {
      const td = document.createElement(r === 0? 'th' : 'td');
      td.innerText = cell;
      tr.appendChild(td);
    });
    out.appendChild(tr);
  });
}

function downloadXLSX() {
  if (!table.length) return alert('No data');
  const ws = XLSX.utils.aoa_to_sheet(table);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, 'table.xlsx');
}
</script>
</body>
</html>
